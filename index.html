<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmulatorJS Auto Loader</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

#game {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="game"></div>

<script>
    // Emulator container
    EJS_player = "#game";

    // Emulator core
    EJS_core = "snes";

    // AUTO LOAD ROM
    EJS_gameUrl = "Street Fighter II (USA).sfc";

    // EmulatorJS data folder
    EJS_pathtodata = "data/";

    // Optional settings
    EJS_startOnLoaded = true;
    EJS_fullscreenOnLoad = false;
</script>

<script src="data/loader.js"></script>

</body>
</html>
